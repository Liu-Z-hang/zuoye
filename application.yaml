spring:
  # 数据源配置（请根据您的实际 MySQL 地址、账号、密码修改）
  datasource:
    url: jdbc:mysql://localhost:3306/studyroom?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    # HikariCP 连接池调优（可选）
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  # SQL脚本初始化配置
  sql:
    init:
      mode: never

  # 项目基础路径（如有需要可配置）
  web:
    resources:
      add-mappings: false   # 不自动映射静态资源，完全走接口

# 服务器端口
server:
  port: 8081
  # 开发阶段允许跨域（后续前端调试用）
  servlet:
    context-path: /api     # 统一加 /api 前缀，方便前端调用

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类包路径（告诉 MP 去哪里扫描实体）
  type-aliases-package: com.studyroom.studyroomserver.entity
  # Mapper XML 文件位置（如果使用 XML）
  mapper-locations: classpath*:mapper/**/*.xml
  # 全局配置
  global-config:
    db-config:
      # 主键类型：自动识别（推荐使用雪花算法 ID）
      id-type: auto
      # 逻辑删除字段名
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # 开启驼峰命名自动映射
    map-underscore-to-camel-case: true
    # 打印 SQL 日志（开发阶段开启，上线关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 日志级别（开发阶段方便调试）
logging:
  level:
    com.example.studyroomserver: DEBUG
    root: INFO